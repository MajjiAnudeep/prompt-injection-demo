server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------------------
    # Proxy — Backend API routes
    # Mirrors the Vite dev proxy in vite.config.js.
    # BACKEND_HOST is resolved at runtime via docker-compose service name.
    # ---------------------------------------------------------------------------
    location /v1 {
        proxy_pass http://backend:${SERVER_PORT};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /internal {
        proxy_pass http://backend:${SERVER_PORT};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------------------------------------------
    # SPA fallback — React Router support
    # Any path not matching a static file is served index.html.
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}