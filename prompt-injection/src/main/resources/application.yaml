server:
  port: 8081

spring:
  application:
    name: prompt-injection
  datasource:
    url: ${DB_HOST}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        # While optional in Hibernate 6, explicitly defining the dialect is sometimes preferred
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}